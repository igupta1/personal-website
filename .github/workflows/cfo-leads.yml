name: CFO lead refresh

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC daily — offset from daily-leads (06:00) and insurance-leads (07:30) to avoid concurrent git pushes.
  workflow_dispatch:
    inputs:
      limit:
        description: "Per-source candidate cap (empty = no cap; e.g. 5 for a quick smoke)"
        required: false
        default: ""
      clear_insights:
        description: "One-shot: clear insights + rescore-only after a prompt-template change"
        type: boolean
        required: false
        default: false
      reenrich:
        description: "Force re-enrichment on every lead (re-runs Gemini lookup against all rows, refreshes industry / DM / has_full_time_cfo per the current prompt)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: cfo-leads
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: cfo_pipeline/pyproject.toml

      - name: Install pipeline
        working-directory: cfo_pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run cfo pipeline
        working-directory: cfo_pipeline
        env:
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
          ADZUNA_APP_ID:        ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:       ${{ secrets.ADZUNA_APP_KEY }}
          CFO_UPLOAD_URL:       https://www.ishaangpta.com/api/upload-cfo-leads
          # Reuses LEADS_UPLOAD_API_KEY (same Bearer secret as the MSP
          # and insurance pipelines — different blob key on the
          # receiving end).
          CFO_UPLOAD_API_KEY:   ${{ secrets.LEADS_UPLOAD_API_KEY }}
          LIMIT:                ${{ inputs.limit }}
          CLEAR_INSIGHTS:       ${{ inputs.clear_insights }}
          REENRICH:             ${{ inputs.reenrich }}
        run: |
          args=("--upload")
          if [[ "$CLEAR_INSIGHTS" == "true" ]]; then
            args+=("--rescore-only" "--clear-insights")
          fi
          if [[ "$REENRICH" == "true" ]]; then
            args+=("--reenrich")
          fi
          if [[ -n "$LIMIT" ]]; then
            args+=("--limit" "$LIMIT")
          fi
          python -m cfo_pipeline.daily_run "${args[@]}"

      - name: Commit updated DB + JSON
        if: success()
        run: |
          git config user.name  "cfo-leads-cron[bot]"
          git config user.email "cfo-leads-cron[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain cfo_pipeline/data/leads.db cfo_pipeline/data/leads.json)" ]]; then
            git pull --rebase --autostash origin master || true
            git add cfo_pipeline/data/leads.db cfo_pipeline/data/leads.json
            git commit -m "cfo cron: nightly lead refresh ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to commit"
          fi
