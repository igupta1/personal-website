name: Insurance lead refresh

on:
  schedule:
    - cron: "30 7 * * *"   # 07:30 UTC daily — offset from daily-leads.yml at 06:00 to avoid concurrent git pushes
  workflow_dispatch:
    inputs:
      limit:
        description: "Per-source candidate cap (empty = no cap; e.g. 5 for a quick smoke)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: insurance-leads
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: insurance_pipeline/pyproject.toml

      - name: Install pipeline
        working-directory: insurance_pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run insurance pipeline
        working-directory: insurance_pipeline
        env:
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          APOLLO_API_KEY:           ${{ secrets.APOLLO_API_KEY }}
          INSURANCE_UPLOAD_URL:     https://www.ishaangpta.com/api/upload-insurance-leads
          INSURANCE_UPLOAD_API_KEY: ${{ secrets.INSURANCE_UPLOAD_API_KEY }}
          LIMIT:                    ${{ inputs.limit }}
        run: |
          args=("--upload")
          if [[ -n "$LIMIT" ]]; then
            args+=("--limit" "$LIMIT")
          fi
          python -m insurance_pipeline.daily_run "${args[@]}"

      - name: Commit updated DB + JSON
        if: success()
        run: |
          git config user.name  "insurance-leads-cron[bot]"
          git config user.email "insurance-leads-cron[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain insurance_pipeline/data/leads.db insurance_pipeline/data/leads.json)" ]]; then
            # Pull latest in case the MSP cron pushed since we started.
            git pull --rebase --autostash origin master || true
            git add insurance_pipeline/data/leads.db insurance_pipeline/data/leads.json
            git commit -m "insurance cron: nightly lead refresh ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to commit"
          fi
