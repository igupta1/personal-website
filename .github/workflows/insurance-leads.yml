name: Insurance lead refresh

# ARCHIVED 2026-07-03 — insurance scraping paused to conserve API
# credits for the CFO pipeline. Also disabled via `gh workflow disable
# "Insurance lead refresh"`. To resume: uncomment the schedule block
# below and run `gh workflow enable "Insurance lead refresh"`.
on:
  # schedule:
  #   - cron: "30 7 * * *"   # 07:30 UTC daily — offset from daily-leads.yml at 06:00 to avoid concurrent git pushes
  workflow_dispatch:
    inputs:
      limit:
        description: "Per-source candidate cap (empty = default 150; 0 = unbounded; e.g. 5 for a quick smoke)"
        required: false
        default: ""
      clear_insights:
        description: "One-shot: clear insights + rescore-only after a prompt-template change"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: insurance-leads
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: insurance_pipeline/pyproject.toml

      - name: Install pipeline
        working-directory: insurance_pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run insurance pipeline
        working-directory: insurance_pipeline
        env:
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          APOLLO_API_KEY:           ${{ secrets.APOLLO_API_KEY }}
          INSURANCE_UPLOAD_URL:     https://www.ishaangpta.com/api/upload-insurance-leads
          # Reuses LEADS_UPLOAD_API_KEY (same Bearer secret as the MSP
          # pipeline — different blob key on the receiving end).
          INSURANCE_UPLOAD_API_KEY: ${{ secrets.LEADS_UPLOAD_API_KEY }}
          # Empty (cron, or dispatch with no input) → 150. Explicit "0"
          # → unbounded (skip --limit). USAspending alone returns ~385
          # candidates uncapped after Issue 5; with FMCSA's full census
          # an uncapped run blows the 90-min job timeout in enrichment.
          LIMIT:                    ${{ inputs.limit }}
          CLEAR_INSIGHTS:           ${{ inputs.clear_insights }}
        run: |
          args=("--upload")
          if [[ "$CLEAR_INSIGHTS" == "true" ]]; then
            args+=("--rescore-only" "--clear-insights")
          fi
          : "${LIMIT:=150}"
          if [[ "$LIMIT" != "0" ]]; then
            args+=("--limit" "$LIMIT")
          fi
          python -m insurance_pipeline.daily_run "${args[@]}"

      - name: Commit updated DB + JSON
        if: success()
        run: |
          git config user.name  "insurance-leads-cron[bot]"
          git config user.email "insurance-leads-cron[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain insurance_pipeline/data/leads.db insurance_pipeline/data/leads.json)" ]]; then
            # Pull latest in case the MSP cron pushed since we started.
            git pull --rebase --autostash origin master || true
            git add insurance_pipeline/data/leads.db insurance_pipeline/data/leads.json
            git commit -m "insurance cron: nightly lead refresh ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to commit"
          fi
